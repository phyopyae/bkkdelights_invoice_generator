<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoices</title>
<link rel="stylesheet" href="/css/bootstrap.min.css">
</head>
<body>
	<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 rounded">
		<div class="container-fluid">
			<a class="navbar-brand" th:href="@{/}">Home</a>

			<button class="navbar-toggler" type="button"
				data-bs-toggle="collapse" data-bs-target="#navbarMenu">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="navbarMenu">
				<ul class="navbar-nav ms-auto">
					<li class="nav-item"><a class="nav-link"
						th:href="@{/invoices}">Invoices</a></li>
					<li class="nav-item"><a class="nav-link" th:href="@{/report}">Report</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>
	<div class="container mt-4">
		<h4 class="mb-0">Invoice List</h4>
		<br></br>
		<a href="/invoice/add" class="btn btn-success">Add Invoice</a>
		<br></br>
		<div th:if="${message}" class="alert alert-info text-center"
			role="alert" th:text="${message}"></div>

		<form th:action="@{/invoices}" method="get"
			class="row g-3 mb-3 align-items-end">

			<div class="col-md-3">
				<input type="text" name="invoiceNumber" class="form-control"
					placeholder="Invoice Number" th:value="${invoiceNumber}">
			</div>

			<div class="col-md-3">
				<input type="text" name="customerName" class="form-control"
					placeholder="Customer Name" th:value="${customerName}">
			</div>

			<div class="col-md-2">
				<label class="form-label">Page Size</label> <select name="size"
					class="form-select">
				    <option value="5"  th:selected="${size == 5}">5</option>
				    <option value="10" th:selected="${size == 10}">10</option>
				    <option value="20" th:selected="${size == 20}">20</option>
				    <option value="50" th:selected="${size == 50}">50</option>
				</select>
			</div>

			<div class="col-md-4">
				<button type="submit" class="btn btn-primary">Search</button>

				<a th:href="@{/invoices}" class="btn btn-secondary"> Reset </a>
			</div>
		</form>

		<table class="table table-bordered">
			<thead>
				<tr>
					<th><a
						th:href="@{/invoices(
            page=${currentPage},
            size=${size},
            invoiceNumber=${invoiceNumber},
            customerName=${customerName},
            sortField='invoiceNumber',
            sortDir=${reverseSortDir})}">
							Invoice Number </a></th>

					<th><a
						th:href="@{/invoices(
            page=${currentPage},
            size=${size},
            invoiceNumber=${invoiceNumber},
            customerName=${customerName},
            sortField='invoiceDate',
            sortDir=${reverseSortDir})}">
							Invoice Date </a></th>

					<th><a
						th:href="@{/invoices(
            page=${currentPage},
            size=${size},
            invoiceNumber=${invoiceNumber},
            customerName=${customerName},
            sortField='customerName',
            sortDir=${reverseSortDir})}">
							Customer Name </a></th>

					<th><a
						th:href="@{/invoices(
            page=${currentPage},
            size=${size},
            invoiceNumber=${invoiceNumber},
            customerName=${customerName},
            sortField='totalAmount',
            sortDir=${reverseSortDir})}">
							Total Amount </a></th>

					<th>Actions</th>
				</tr>
			</thead>
			<tbody>
				<tr th:if="${#lists.isEmpty(invoices)}">
					<td colspan="5" class="text-center">No invoices found.</td>
				</tr>
				<tr th:each="invoice : ${invoices}">
					<td th:text="${invoice.invoiceNumber}"></td>
					<td th:text="${invoice.invoiceDate}"></td>
					<td th:text="${invoice.customerName}"></td>
					<td th:text="${invoice.totalAmount}"></td>
					<td><a
						th:href="@{/invoice/{invoiceNumber}(invoiceNumber=${invoice.invoiceNumber})}"
						class="btn btn-primary">View Details</a>

						<form
							th:action="@{/invoice/print/{invoiceNumber}(invoiceNumber=${invoice.invoiceNumber})}"
							method="post" style="display: inline-block;">
							<button type="submit" class="btn btn-success"
								onclick="return confirm('Are you sure you want to print this invoice?')">Print</button>
						</form>

						<form
							th:action="@{/invoice/delete/{invoiceNumber}(invoiceNumber=${invoice.invoiceNumber})}"
							method="post" style="display: inline-block;">
							<button type="submit" class="btn btn-danger"
								onclick="return confirm('Are you sure you want to delete this invoice?')">Delete</button>
						</form></td>
				</tr>
			</tbody>
		</table>
		<nav th:if="${totalPages > 1}">
			<ul class="pagination justify-content-center">

				<li class="page-item"
					th:classappend="${currentPage == 0} ? 'disabled'"><a
					class="page-link"
					th:href="@{/invoices(
                    page=${currentPage - 1},
                    size=${size},
                    invoiceNumber=${invoiceNumber},
                    customerName=${customerName},
                    sortField=${sortField},
                    sortDir=${sortDir})}">
						Previous </a></li>

				<li class="page-item"
					th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
					th:classappend="${i == currentPage} ? 'active'"><a
					class="page-link" th:text="${i + 1}"
					th:href="@{/invoices(
                    page=${i},
                    size=${size},
                    invoiceNumber=${invoiceNumber},
                    customerName=${customerName},
                    sortField=${sortField},
                    sortDir=${sortDir})}">
				</a></li>

				<li class="page-item"
					th:classappend="${currentPage + 1 >= totalPages} ? 'disabled'">
					<a class="page-link"
					th:href="@{/invoices(
                    page=${currentPage + 1},
                    size=${size},
                    invoiceNumber=${invoiceNumber},
                    customerName=${customerName},
                    sortField=${sortField},
                    sortDir=${sortDir})}">
						Next </a>
				</li>

			</ul>
		</nav>
	</div>
	<!-- Footer -->
	<footer class="bg-light text-dark text-center mt-5 py-3 border-top">
		<p>&copy; 2026 Techbook Myanmar. All rights reserved.</p>
	</footer>
</body>
</html>
